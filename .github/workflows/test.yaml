name: Test

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        run: rustup show

      - name: cargo check
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --all-features

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        run: rustup show

      - name: cargo clippy
        env:
          RUSTFLAGS: -D warnings
        run: cargo clippy --all-features

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        run: rustup show

      - name: cargo fmt
        run: cargo fmt --all --check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        run: rustup show

      - name: Setup Zig
        run: |
          set -euo pipefail

          ZIG_VERSION=0.16.0
          ZIG_SHA256=70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
          ZIG_ARCHIVE="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          ZIG_DIR="${RUNNER_TEMP}/zig"
          curl -fsSLo "${RUNNER_TEMP}/${ZIG_ARCHIVE}" "${ZIG_URL}"
          echo "${ZIG_SHA256}  ${RUNNER_TEMP}/${ZIG_ARCHIVE}" | sha256sum -c -
          mkdir -p "${ZIG_DIR}"
          tar -xJf "${RUNNER_TEMP}/${ZIG_ARCHIVE}" -C "${ZIG_DIR}" --strip-components=1
          echo "${ZIG_DIR}" >> "${GITHUB_PATH}"
          "${ZIG_DIR}/zig" version

      - name: Install cargo-zigbuild
        run: |
          CARGO_ZIGBUILD_VERSION=0.23.0
          cargo install --locked --version "${CARGO_ZIGBUILD_VERSION}" cargo-zigbuild

      - name: Build
        env:
          RUSTFLAGS: -D warnings
        run: cargo zigbuild --target x86_64-unknown-linux-gnu.2.17 --release

      - name: Test
        run: |
          ./test.sh

  aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Rust
        run: rustup show

      - name: Setup Zig
        run: |
          set -euo pipefail

          ZIG_VERSION=0.16.0
          ZIG_SHA256=70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
          ZIG_ARCHIVE="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          ZIG_DIR="${RUNNER_TEMP}/zig"
          curl -fsSLo "${RUNNER_TEMP}/${ZIG_ARCHIVE}" "${ZIG_URL}"
          echo "${ZIG_SHA256}  ${RUNNER_TEMP}/${ZIG_ARCHIVE}" | sha256sum -c -
          mkdir -p "${ZIG_DIR}"
          tar -xJf "${RUNNER_TEMP}/${ZIG_ARCHIVE}" -C "${ZIG_DIR}" --strip-components=1
          echo "${ZIG_DIR}" >> "${GITHUB_PATH}"
          "${ZIG_DIR}/zig" version

      - name: Install cargo-zigbuild
        run: |
          CARGO_ZIGBUILD_VERSION=0.23.0
          cargo install --locked --version "${CARGO_ZIGBUILD_VERSION}" cargo-zigbuild

      - name: Build
        env:
          RUSTFLAGS: -D warnings
        run: cargo zigbuild --target aarch64-unknown-linux-gnu.2.17 --release

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Test
        run: |
          expected="testuser1:*:2001:2001::/home/testuser:/bin/bash"
          result="$(docker run --rm \
            --volume "$PWD/examples/passwd.json":/etc/passwd.json:ro \
            --volume "$PWD/target/aarch64-unknown-linux-gnu/release/libnss_jsonfile.so":/lib/aarch64-linux-gnu/libnss_jsonfile.so.2:ro \
            --platform linux/arm64 \
            docker.io/library/debian:buster \
            getent -s jsonfile passwd testuser1)"
          echo "expected: $expected"
          echo "     got: $result"
          [ "$result" = "$expected" ] || exit 1
